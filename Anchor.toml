[toolchain]
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.devnet]
raydium = "3xVEDAESdq1vsxieFZbW5bct7sQ3DtbUY4Ha7ZY6QcDz"

[registry]
url = "https://api.apr.dev"

[provider]
